name: Uptime Monitor

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  check-servers:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Check All Shards & Update Logs
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            
            // ADD NEW SHARDS HERE
            const SHARDS = [
              { id: '1', url: 'https://ztext-cloudbox.serveousercontent.com' },
              { id: '2', url: 'https://ztext-cloudbox-2.serveousercontent.com' } // Example second shard
            ];
            
            const TIME = new Date().toISOString().replace(/\.\d{3}Z$/, 'Z');
            
            for (const shard of SHARDS) {
              console.log(`\nPinging Shard ${shard.id}: ${shard.url}`);
              let status = 'down';
              
              try {
                const response = await fetch(shard.url, {
                  method: 'GET',
                  headers: {
                    'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) Chrome/120.0.0.0 Safari/537.36',
                    'Accept': '*/*'
                  },
                  redirect: 'follow',
                  signal: AbortSignal.timeout(10000)
                });
                
                if (response.ok) {
                  status = 'up';
                  console.log(`Shard ${shard.id} RESULT: UP`);
                } else {
                  console.log(`Shard ${shard.id} RESULT: DOWN (${response.status})`);
                }
              } catch (error) {
                console.log(`Shard ${shard.id} ERROR: ${error.message}`);
              }
              
              // Read, Update, and Save history_{id}.json
              const fileName = `history_${shard.id}.json`;
              let history = [];
              if (fs.existsSync(fileName)) {
                history = JSON.parse(fs.readFileSync(fileName, 'utf8'));
              }
              
              history.push({ time: TIME, status: status });
              if (history.length > 100) history = history.slice(-100); // Keep last 100
              
              fs.writeFileSync(fileName, JSON.stringify(history, null, 2));
            }

      - name: Commit and Push All Histories
        run: |
          git config --global user.name "Z-Text Bot"
          git config --global user.email "bot@ztext.app"
          git pull --rebase --autostash
          git add history_*.json
          git commit -m "Update multi-shard status logs" || exit 0
          git push